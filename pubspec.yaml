name: flutter_application_2
description: "A new Flutter project."

# Mencegah paket dipublish ke pub.dev
publish_to: "none"

# Versi aplikasi
version: 1.0.0+1

# Versi SDK Dart minimum
environment:
  sdk: ^3.9.2

# Dependency utama aplikasi
dependencies:
  image_picker: ^1.1.2
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: ^0.19.0 # Tambahkan ini untuk DateFormat

# Dependency untuk pengujian dan linter
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

# Bagian khusus untuk Flutter
flutter:
  uses-material-design: true

  assets:
    - assets/images/cucimotor.jpg
    - assets/images/promo.jpg
    - assets/images/detailing.jpg
    - assets/images/detailing engine.jpg
    - assets/images/detailing full.jpg
    - assets/images/profil.jpg
    - assets/images/splash.png
    - assets/images/promo1.jpg
    - assets/images/promo2.jpg
    - assets/images/promo3.jpg
